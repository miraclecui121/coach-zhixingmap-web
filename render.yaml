services:
  - type: web
    name: coach-marketplace-h5
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: WECHAT_OAUTH_APPID
        sync: false
      - key: WECHAT_OAUTH_SECRET
        sync: false
      - key: WECHAT_OAUTH_CALLBACK_URL
        sync: false
      - key: WECHAT_OAUTH_SCOPE
        value: snsapi_userinfo
      - key: ADMIN_OPENID
        sync: false
      - key: BOOTSTRAP_FIRST_WECHAT_ADMIN
        value: "true"
      - key: WECHAT_VERIFY_FILENAME
        sync: false
      - key: WECHAT_VERIFY_CONTENT
        sync: false
